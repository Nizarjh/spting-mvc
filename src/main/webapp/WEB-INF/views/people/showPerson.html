<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Profile</title>
  </head>

  <body>
    <p th:text="${person.getName()} + ',' +  ${person.getAge()} + ',' +  ${person.getEmail()} ">Value</p>

    <div th:if="${books}">
      <hr />
      <p><b>Книги данного инвалида:</b></p>
      <div th:each="book : ${books}">
        <a
          th:href="@{/books/{id}(id=${book.getBookId()})}"
          th:text="${book.getTitle()} + ',' + ${book.getAuthor()} + ',' + ${book.getPublishDate()}"
          >book</a
        >
      </div>
    </div>

    <hr />
    <br />
    <form
      th:method="GET"
      th:action="@{/people/{id}/edit(id=${person.getId()})}"
    >
      <input type="submit" value="Edit person" />
      <form
        th:method="DELETE"
        th:action="@{/people/{id}(id=${person.getId()})}"
      >
        <input type="submit" value="Delete" />
      </form>
    </form>
  </body>
</html>
