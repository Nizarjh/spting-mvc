<!DOCTYPE html>
<html lang="en" xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>All Books</title>
</head>
<body>

    <div th:each="book : ${books}">
        <a th:href="@{/books/{id}(id=${book.getBookId()})}" th:text="${book.getTitle()}">user</a>
    </div>
    <hr>
    <br />
    <div class="list">
        <a th:href="@{/books/new}"><b>Добавить книгу</b></a>
    </div>
</body>
</html>
