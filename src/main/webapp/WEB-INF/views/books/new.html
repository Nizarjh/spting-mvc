<!DOCTYPE html>
<html lang="en" xmlns:th="http://thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>New book</title>
</head>

<body>

    <form th:method="POST" th:action="@{/books}" th:object="${book}">
        <label for="title">Enter title: </label>
        <input type="text" th:field="*{title}" id="title">
        <div class="error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}">Title error</div>
        <br />
        <label for="author">Enter author: </label>
        <input type="text" th:field="*{author}" id="author">
         <div class="error" th:if="${#fields.hasErrors('author')}" th:errors="*{author}">Author error</div>
        <br />
        <label for="publishDate">Enter publishDate: </label>
        <input type="datetime-local" th:field="*{publishDate}" id="publishDate">
        <div class="error" th:if="${#fields.hasErrors('publishDate')}" th:errors="*{publishDate}">publishDate error</div>

        <br />
        <input type="submit" value="Create" />
    </form>
</body>

</html>
